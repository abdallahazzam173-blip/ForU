<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>

.hearts span{position:fixed;bottom:-40px;font-size:22px;animation:up 8s linear infinite;opacity:.7}
@keyframes up{to{transform:translateY(-120vh)}}
.card{max-width:460px;margin:6vh auto;background:#fff;padding:28px;border-radius:24px;text-align:center;box-shadow:0 10px 30px #0003}
img{width:220px;height:220px;object-fit:cover;border-radius:18px;background:#f4f4f4}
button{padding:12px 24px;border:none;border-radius:24px;font-size:18px;cursor:pointer}
#yes{background:#ff4d6d;color:#fff;transition:.2s}
#no{background:#ddd;position:fixed}
#p2,#p3{display:none}
input{padding:10px;border-radius:10px}
</style></head><body>
<div class="hearts"></div>
<div id="p1" class="card">
<img src="cover.jpg" alt="cover"><h2>💖 Will you go on a date with me Ya t2to2a? 💖</h2>
<p>Anty btfkry!!...🥹❤️</p>
<div style="display:flex;justify-content:center;gap:15px;position:relative;"><button id="yes">YES 🥰</button><button id="no">NO 🙈</button></div>
</div>
<div id="p2" class="card">
<img src="happy.jpg"><h2>Ahm 7aga 7oryt l a5tyar 😍❤️</h2><p>kda kda kont 3arf ank htwf2y 💕</p>
<p>📅 amirty t7bt n5rog emta ?</p><input id="dt" type="datetime-local"><br><br>
<button onclick="finish()">Yala bsr3aaa ❤️</button>
</div>
<div id="p3" class="card">
<img src="date.jpg"><h2>wenaby 3asl! 🌹</h2><p id="msg"></p><h3>❤️ I can't wait to see you! Love u ❤️</h3>
</div>
<script>
const hs=document.querySelector('.hearts');
for(let i=0;i<25;i++){let s=document.createElement('span');s.textContent='💖';s.style.left=Math.random()*100+'vw';s.style.animationDelay=Math.random()*8+'s';hs.appendChild(s);}
const no=document.getElementById('no'),yes=document.getElementById('yes');let scale=1;
function move(){no.style.left=Math.random()*(innerWidth-90)+'px';no.style.top=Math.random()*(innerHeight-50)+'px';scale+=0.08;yes.style.transform='scale('+scale+')';}
setTimeout(()=>{const r=yes.getBoundingClientRect();no.style.left=(r.right+15)+'px';no.style.top=r.top+'px';},100);no.onmouseover=move;no.ontouchstart=move;no.onclick=move;
yes.onclick=()=>{document.getElementById('p1').style.display='none';document.getElementById('p2').style.display='block';confetti();}
function finish(){let v=dt.value;if(!v){alert('Please pick a date ❤️');return;}p2.style.display='none';p3.style.display='block';msg.innerText='See you on: '+new Date(v).toLocaleString();}
function confetti(){for(let i=0;i<80;i++){let e=document.createElement('div');e.textContent=['🎉','💖','✨'][i%3];e.style.position='fixed';e.style.left=Math.random()*100+'vw';e.style.top='-20px';e.style.fontSize='24px';e.style.transition='3s linear';document.body.appendChild(e);setTimeout(()=>{e.style.transform='translateY(120vh) rotate(720deg)';},10);setTimeout(()=>e.remove(),3200);}}
</script></body></html>
